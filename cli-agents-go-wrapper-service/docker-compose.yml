version: "3.9"

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cli-agent-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      # API keys — set in .env or pass via shell
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - CURSOR_API_KEY=${CURSOR_API_KEY:-}
      # Gateway config
      - GATEWAY_HOST=0.0.0.0
      - GATEWAY_PORT=8080
      - GATEWAY_LOG_FILE=/var/log/gateway/gateway.log
    volumes:
      # Persist agent working directories across container restarts
      - workspace:/workspace
      # Host path: repo root logs/gateway when using root compose; here = sibling ../logs/gateway
      - ../logs/gateway:/var/log/gateway
      # Optional: mount a custom config file
      # - ./config.json:/app/config.json:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  workspace:
    driver: local
