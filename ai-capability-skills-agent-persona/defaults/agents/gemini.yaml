apiVersion: v1
kind: AgentProfile
metadata:
  name: gemini
  description: "Google Gemini CLI agent via the CLI Agent Gateway"
  version: "1.0.0"

spec:
  gatewayFlow: gemini

  defaults:
    mode: default
    model: ""
    connectionMode: spawn

  supportedModes:
    - default
    - sandbox

  personaApplication:
    method: skill

  capabilityApplication:
    skills: merge
    mcps: attach

  promptTemplate: |
    {persona_prompt}

    {capability_prompts}

  healthCheck:
    endpoint: /agents/gemini/auth
    field: loggedIn
    expectedValue: true
