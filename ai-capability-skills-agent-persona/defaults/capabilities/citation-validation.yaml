apiVersion: v1
kind: Capability
metadata:
  name: citation-validation
  description: "Validates citations and references in research documents"
  tags: [research, citations, validation, review]
  version: "1.0.0"

spec:
  prompt: |
    When reviewing content, validate all citations and references:
    - Check that claims have supporting references
    - Flag unsupported assertions as needing evidence
    - Note when sources are outdated (older than {config.maxSourceAge} years for fast-moving fields)
    - Identify potential circular references
    - Verify source credibility hierarchy: peer-reviewed > preprint > official report > news > blog
    - Flag if critical claims rely on a single source

  compatibleAgents:
    - claude-code
    - gemini

  requiredMcps: []

  dependsOn: []

  config:
    maxSourceAge:
      type: integer
      default: 5
      description: "Max age in years before a source is flagged as outdated"
    requirePeerReview:
      type: boolean
      default: true
      description: "Whether to require peer-reviewed sources for key claims"
