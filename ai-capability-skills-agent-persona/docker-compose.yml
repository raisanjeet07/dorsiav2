version: "3.9"

services:
  capability-service:
    build: .
    ports:
      - "8100:8100"
    environment:
      CAPS_HOST: "0.0.0.0"
      CAPS_PORT: "8100"
      CAPS_GATEWAY_HTTP_URL: "http://gateway:8080"
      CAPS_HOT_RELOAD_ENABLED: "true"
      CAPS_PERSIST_API_EXTENSIONS: "true"
      CAPS_LOG_LEVEL: "INFO"
    volumes:
      # Mount user extensions for persistence across restarts
      - ./config/extensions:/app/config/extensions
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    image: cli-agent-gateway:latest
    ports:
      - "8080:8080"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
